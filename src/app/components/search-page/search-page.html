<section class="search-page pb-12">
  <div class="search-page__header">
    <div class="search-page__container">
      <h2>Search Results</h2>
      <p class="text-grey" *ngIf="query">Showing results for "{{ query }}"</p>
      <p class="text-grey" *ngIf="!query && categoryId !== 'all'">Showing results for category "{{ categoryId }}"</p>
      <p class="text-grey" *ngIf="!query && categoryId === 'all'">Showing all products</p>
    </div>
  </div>

  <div class="search-page__container">
    <div class="products-grid" *ngIf="products.length > 0; else noResults">
      <app-product-card
        *ngFor="let p of products"
        [badgeText]="p.badgeText"
        [badgeType]="p.badgeType"
        [title]="p.title"
        [price]="p.price"
        [originalPrice]="p.originalPrice"
        [vendor]="p.vendor"
        [imageRatio]="p.imageRatio"
        [product]="p"
        [imageUrl]="p.imageUrl">
      </app-product-card>
    </div>

    <ng-template #noResults>
      <div class="no-results">
        <h3>No products found!</h3>
        <p>Try searching for something else or exploring our categories.</p>
      </div>
    </ng-template>
  </div>
</section>
